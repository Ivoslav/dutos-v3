<div class="mt-2 p-2 bg-warning bg-opacity-10 border border-warning rounded shadow-sm">
    <div class="d-flex justify-content-between align-items-start mb-1">
        <strong class="text-danger">{{ item.obj.title }}</strong>
        <form action="{% url 'dismiss_announcement' %}" method="post" class="m-0">
            {% csrf_token %}
            <input type="hidden" name="announcement_id" value="{{ item.obj.id }}">
            <button type="submit" class="btn btn-sm btn-link text-danger p-0" title="Отмени"><i class="bi bi-x-circle-fill fs-5"></i></button>
        </form>
    </div>
    <div class="small text-dark mb-2 fw-bold" style="white-space: pre-wrap;">{{ item.obj.message }}</div>
    
    <div class="d-flex align-items-center" data-bs-toggle="modal" data-bs-target="#routineModal{{ item.obj.id }}" style="cursor: pointer;" title="Цъкни, за да видиш кой не е разбрал">
        <div class="progress flex-grow-1" style="height: 14px; border-radius: 7px; background-color: #fff;">
            <div class="progress-bar bg-warning text-dark fw-bold" style="width: {{ item.percent }}%;"></div>
        </div>
        <span class="ms-2 small fw-bold text-muted" style="min-width: 60px; text-align: right;">{{ item.percent }}% видяли</span>
    </div>

    <div class="modal fade" id="routineModal{{ item.obj.id }}" tabindex="-1" aria-hidden="true" onclick="event.stopPropagation();">
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
            <div class="modal-content border-warning">
                <div class="modal-header bg-warning text-dark">
                    <h5 class="modal-title fw-bold"><i class="bi bi-person-x-fill me-2"></i> Не знаят за промяната</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    {% if item.unread_soldiers %}
                        <ul class="list-group list-group-flush">
                            {% for s in item.unread_soldiers %}
                                <li class="list-group-item d-flex justify-content-between align-items-center">
                                    <span><strong>{{ s.last_name }}</strong> ({{ s.company }} рота)</span>
                                    <span class="badge bg-warning text-dark">Не е видял</span>
                                </li>
                            {% endfor %}
                        </ul>
                    {% else %}
                        <div class="p-4 text-center text-success fw-bold">Всички са уведомени!</div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
